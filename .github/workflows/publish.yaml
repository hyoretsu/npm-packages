name: Publish Changed Packages

on:
  push:
    branches:
      - main
    paths:
      - packages/**
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Folder name to publish (e.g. "configs" or "packages/configs")'
        required: true
        type: string

jobs:
  detect:
    name: Detect affected
    runs-on: ubuntu-latest
    outputs:
      # JSON object keyed by task, e.g. {"publish":["@hyoretsu/providers"]}. A matrix
      # built from [] spawns no jobs, so an unchanged push is skipped without a
      # separate "any" flag.
      tasks: ${{ steps.affected.outputs.tasks }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Full history so the push diff against the previous commit resolves.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Compute packages to publish
        id: affected
        env:
          MANUAL_INPUT: ${{ inputs.package_name }}
          BASE_SHA: ${{ github.event.before }}
        run: |
          if [ -n "$MANUAL_INPUT" ]; then
            # Manual trigger: resolve the given folder to its package name.
            dir="${MANUAL_INPUT#packages/}"
            name=$(node -e "process.stdout.write(require('./packages/$dir/package.json').name)")
            tasks=$(jq -nc --arg n "$name" '{publish: [$n]}')
          else
            # Push trigger: diff against the commit before the push. Fall back to
            # HEAD~1 when the SHA is the zero ref (first push / force-push).
            base="$BASE_SHA"
            if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
              base=$(git rev-parse HEAD~1)
            fi
            tasks=$(bun scripts/affected-packages.ts "$base" publish)
          fi

          echo "Tasks: $tasks"
          echo "tasks=$tasks" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.package }}
    needs: detect
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.detect.outputs.tasks)['publish'] }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-publish-${{ matrix.package }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-publish-${{ matrix.package }}-

      - name: Install dependencies
        run: bun i --frozen-lockfile

      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1; ubuntu-latest's
      # bundled npm is older, so the OIDC exchange silently fails.
      - name: Update npm
        run: npm install -g npm@latest

      # The package `publish` script runs `npm publish --provenance --access public`;
      # Turbo builds it first (publish -> prepublish -> build) with cache reuse.
      - name: Publish ${{ matrix.package }}
        run: bun turbo run publish -F ${{ matrix.package }} --cache-dir=.turbo
